<div class="conseils-container">

    <!-- Barre de filtre -->
    <input type="text" [(ngModel)]="searchTerm" placeholder="Rechercher un article..." class="search-bar" />

    <!-- Message de chargement -->
    <div *ngIf="loading" class="loading">Chargement des articles...</div>

    <!-- Message d'erreur -->
    <div *ngIf="error" class="error">{{ error }}</div>

    <!-- Liste des articles filtrés -->
    <div *ngIf="!loading && !error">

        <!-- Message si aucun article ne correspond -->
        <div *ngIf="filteredArticles().length === 0" class="empty">
            Aucun conseil trouvé
        </div>

        <!-- Affichage des articles -->
        <div *ngFor="let article of filteredArticles()" [ngClass]="article.featured ? 'card featured-card' : 'card'">
            <h3>{{ article.title }}</h3>
            <p>{{ article.description }}</p>
            <span class="category">{{ article.category }}</span> |
            <span class="impact">{{ article.impact }} kg CO₂ économisés</span>
        </div>

    </div>
</div>
